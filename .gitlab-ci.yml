stages:
  - test
  - build

# ── Backend (Django) ─────────────────────────────────────────────────────────

backend:test:
  stage: test
  image: python:3.11-slim
  before_script:
    - cd backend
    - pip install -r requirements.txt --quiet
  script:
    - python manage.py test --verbosity=2
  allow_failure: false

# ── Frontend (React) ─────────────────────────────────────────────────────────

frontend:lint:
  stage: test
  image: node:20-alpine
  before_script:
    - cd frontend
    - npm ci --silent
  script:
    - npx eslint src/ --max-warnings=0
  allow_failure: false

frontend:build:
  stage: build
  image: node:20-alpine
  before_script:
    - cd frontend
    - npm ci --silent
  script:
    - npm run build
  artifacts:
    paths:
      - frontend/build/
    expire_in: 1 hour
